apiVersion: apps/v1
kind: Deployment
metadata:
  name: ivs-springboot
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ivs-springboot
  template:
    metadata:
      labels:
        app: ivs-springboot
    spec:
      containers:
        - name: springboot
          # image: rahulwagh17/jhooq-docker-demo:jhooq-docker-demo
          image: isaradhi24/ivs-docker-demo:ivs-docker-demo
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: ivs-springboot
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: ivs-springboot
